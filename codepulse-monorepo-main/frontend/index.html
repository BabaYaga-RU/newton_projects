<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodePulse | Online IDE</title>
    <link rel="icon" type="image/png" href="src/assets/logo.png">
    <meta name="description" content="A simple online IDE for code execution.">
    <meta name="keywords" content="Online IDE, Code Execution, Simple IDE">
    <meta name="author" content="Patrick Araujo">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Simplified CSS - removed particles, animations, and complex effects */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #252526;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            overflow: hidden;
            height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #1e1e1e;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            color: #ffffff;
        }
        
        .header-logo {
            height: 32px;
            width: auto;
        }
        
        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        select, button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            background: #007acc;
            color: white;
            transition: background 0.2s ease;
        }
        
        select {
            background: #333;
            color: white;
        }
        
        select:hover, button:hover {
            background: #005a9e;
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .editor-section, .output-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }
        
        .output-section {
            border-right: none;
        }
        
        .section-title {
            background: #2d2d30;
            color: #ccc;
            padding: 12px 20px;
            font-weight: bold;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 50px;
        }
        
        .editor-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        textarea {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }
        
        textarea:focus {
            background: #252526;
        }
        
        #output {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .output-pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            font-family: 'Courier New', monospace;
        }
        
        .alert {
            padding: 12px 15px;
            margin: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        
        .alert-success {
            background: #1a3d2e;
            color: #4ade80;
            border: 1px solid #22c55e;
        }
        
        .alert-danger {
            background: #3d1a1a;
            color: #ef4444;
            border: 1px solid #ef4444;
        }
        
        .alert-info {
            background: #1a2d3d;
            color: #60a5fa;
            border: 1px solid #60a5fa;
        }
        
        .loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            padding: 20px;
            color: #00d1ff;
            background: rgba(0,0,0,0.8);
            border-radius: 8px;
        }
        
        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #007acc;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            margin: 0 auto 10px;
        }
        
        @media (max-width: 900px) {
            .content {
                flex-direction: column;
            }
            .editor-section {
                border-right: none;
                border-bottom: 1px solid #333;
            }
        }
        
        .footer {
            background: #1a1a1a;
            color: #ccc;
            padding: 15px 20px;
            font-size: 14px;
            text-align: center;
            border-top: 1px solid #333;
        }
        
        .footer a {
            color: #60a5fa;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <img src="src/assets/logo.png" alt="CodePulse Logo" class="header-logo">
                CodePulse IDE
            </h1>
            <div class="header-controls">
                <select id="language">
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="java">Java</option>
                    <option value="cpp">C++</option>
                    <option value="csharp">C#</option>
                    <option value="php">PHP</option>
                    <option value="go">Go</option>
                    <option value="ruby">Ruby</option>
                </select>
                <button onclick="executeCode()">Run</button>
            </div>
        </div>
        
        <div class="content">
            <div class="editor-section">
                <div class="section-title">
                    Code Editor
                </div>
                <textarea id="code" placeholder="Write your code here...">print('Hello CodePulse!')</textarea>
            </div>
            <div class="output-section">
                <div class="section-title">
                    Output
                </div>
                <div id="output"><div class="alert alert-info">Welcome to CodePulse IDE! Type your code and click "Run" or use Ctrl+Enter</div></div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Executing code...</p>
                </div>
            </div>
        </div>
        
        <div class="footer">
            © 2026 Patrick Araujo • Simple Online IDE
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://codepulse-monorepo-backend.vercel.app';

        async function executeCode() {
            const code = document.getElementById('code').value;
            const language = document.getElementById('language').value;
            const output = document.getElementById('output');
            const loading = document.getElementById('loading');

            if (!code.trim()) {
                showOutput('Please enter some code!', 'info');
                return;
            }

            loading.style.display = 'block';
            output.innerHTML = '';

            try {
                const response = await fetch(`${BACKEND_URL}/api/execute`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ code, language })
                });

                const data = await response.json();
                loading.style.display = 'none';

                if (response.ok) {
                    if (data.output && data.output.trim()) {
                        showOutput(data.output, 'success');
                    } else if (data.error) {
                        showOutput('Error: ' + data.error, 'danger');
                    } else {
                        showOutput('(no output)', 'info');
                    }
                } else if (response.status === 408) {
                    showOutput('Timeout: The code took too long to execute (> 5s)', 'danger');
                } else {
                    showOutput(data.error || 'Execution error', 'danger');
                }
            } catch (error) {
                loading.style.display = 'none';
                showOutput(`Connection error: ${error.message}`, 'danger');
            }
        }

        function showOutput(message, type) {
            const output = document.getElementById('output');
            const pre = document.createElement('pre');
            pre.className = 'output-pre';
            pre.textContent = message;
            output.innerHTML = '';
            output.appendChild(pre);
        }

        // Language boilerplates
        const boilerplates = {
            python: "print('Hello CodePulse!')",
            javascript: "console.log('Hello CodePulse!');",
            java: "public class Main {\n    public static void main(String[] args) {\n        System.out.println(\"Hello CodePulse!\");\n    }\n}",
            cpp: "#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << \"Hello CodePulse!\" << endl;\n    return 0;\n}",
            csharp: "using System;\n\nclass Program {\n    static void Main() {\n        Console.WriteLine(\"Hello CodePulse!\");\n    }\n}",
            php: "<?php\necho 'Hello CodePulse!';\n?>",
            go: "package main\n\nimport \"fmt\"\n\nfunc main() {\n    fmt.Println(\"Hello CodePulse!\")\n}",
            ruby: "puts 'Hello CodePulse!'"
        };

        // Dynamic language switching
        document.getElementById('language').addEventListener('change', function() {
            const currentCode = document.getElementById('code').value;
            const currentCodeTrimmed = currentCode.trim();
            
            const isDefaultCode = Object.values(boilerplates).some(boilerplate => 
                currentCodeTrimmed === boilerplate.trim()
            );
            
            if (isDefaultCode) {
                const selectedLanguage = this.value;
                document.getElementById('code').value = boilerplates[selectedLanguage];
            }
        });

        // Allow run with Ctrl+Enter
        document.getElementById('code').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                executeCode();
            }
        });
    </script>
</body>
</html>
