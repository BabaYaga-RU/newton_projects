<!DOCTYPE html>
<html>
    <head>
        <title>Javacript - 22/04</title>
    </head>
    <body>
        <script type="text/javascript">
            document.write("Hello World!");
            document.write("<br>");

            var estado = window.prompt("Digite a sigla de um estado","RJ");
            var capital = "";
            if (estado == "RJ") capital = "Rio de Janeiro";
            if (estado == "MG") capital = "Belo Horizonte";
            if (estado == "SP") capital = "São Paulo";
            document.write("Estado: ", estado, "<br>Capital: ", capital);
        </script>
    </body>
</html>
