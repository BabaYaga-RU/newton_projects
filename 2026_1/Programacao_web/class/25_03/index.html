<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Aula 25/03</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=devide-width,
        inicial-scale=1.0">
    </head>
    <style type="text/css">
        h1,h2,h3 {color: green}
        p {text-align: center;
            font-family: Arial, Helvetica, sans-serif; 
            color: blueviolet;}
        p.direita {
            text-align: right;
            color: aquamarine;
        }
        .generalista {
            color: blue;
        }
        p#identificacao {
            color: aqua;
            text-align: center;
            border-style: solid;
            border-width: 1px;
        }
        #bolinha {
            color: red;
            text-align: center;
            border-style: dotted;
            border-width: 1px;
            font-size: x-large;
        }
    </style>
    <body>
        <h1>Teste Cor Verde</h1>
        <p>Teste paragrafo</p>
        <p class="direita">Teste a direita de classe criada</p>
        <h6 class="generalista">Generalista</h6>
        <!-- Nao é uma boa pratica usar id duplicado-->
        <p id="identificacao">Por ID</p>
        <h1 id="bolinha">Por ID generalista</h1>
    </body>
</html>
